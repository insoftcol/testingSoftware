name: CI — Pruebas de Integración y Sistema

# ─── Disparadores ────────────────────────────────────────────────────────────
# Se ejecuta en push Y en Pull Request hacia main/develop.
# Esto garantiza la RESTRICCIÓN DE INTEGRACIÓN: ningún PR puede mergearse
# sin que el pipeline pase (se configura con Branch Protection en GitHub).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Taller de Integración (Registraduría)
  # ═══════════════════════════════════════════════════════════════════════════
  test-taller-integracion:
    name: "Taller — Registraduría (H2 + Mockito + REST)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas + cobertura JaCoCo
        run: mvn clean verify --no-transfer-progress
        working-directory: taller-integracion

      - name: Publicar reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-taller-integracion
          path: taller-integracion/target/site/jacoco/
          retention-days: 15

      - name: Publicar resultados de pruebas unitarias (Surefire)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-taller-integracion
          path: taller-integracion/target/surefire-reports/
          retention-days: 15

      - name: Publicar resultados de pruebas de integración (Failsafe)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-taller-integracion
          path: taller-integracion/target/failsafe-reports/
          retention-days: 15

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — PJBA Transferencias Bancarias
  # ═══════════════════════════════════════════════════════════════════════════
  test-pjba-integracion:
    name: "PJBA — Transferencias Bancarias (H2 + Mockito + REST)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas + cobertura JaCoCo
        run: mvn clean verify --no-transfer-progress
        working-directory: pjba-integracion

      - name: Publicar reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-pjba-integracion
          path: pjba-integracion/target/site/jacoco/
          retention-days: 15

      - name: Publicar resultados de pruebas unitarias (Surefire)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-pjba-integracion
          path: pjba-integracion/target/surefire-reports/
          retention-days: 15

      - name: Publicar resultados de pruebas de integración (Failsafe)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-pjba-integracion
          path: pjba-integracion/target/failsafe-reports/
          retention-days: 15

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Logística Cotizador de Envíos
  # ═══════════════════════════════════════════════════════════════════════════
  test-logistica-integracion:
    name: "Logística — Cotizador de Envíos (H2 + Mockito + REST)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas + cobertura JaCoCo
        run: mvn clean verify --no-transfer-progress
        working-directory: logistica-integracion

      - name: Publicar reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-logistica-integracion
          path: logistica-integracion/target/site/jacoco/
          retention-days: 15

      - name: Publicar resultados de pruebas unitarias (Surefire)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-logistica-integracion
          path: logistica-integracion/target/surefire-reports/
          retention-days: 15

      - name: Publicar resultados de pruebas de integración (Failsafe)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-logistica-integracion
          path: logistica-integracion/target/failsafe-reports/
          retention-days: 15

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Resumen final (depende de los 3 anteriores)
  # Solo pasa si los 3 jobs anteriores pasaron
  # Este job es el que se configura como REQUIRED en Branch Protection
  # ═══════════════════════════════════════════════════════════════════════════
  pipeline-status:
    name: "Pipeline completo — OK para merge"
    runs-on: ubuntu-latest
    needs:
      - test-taller-integracion
      - test-pjba-integracion
      - test-logistica-integracion
    if: always()

    steps:
      - name: Verificar que todos los proyectos pasaron
        run: |
          if [[ "${{ needs.test-taller-integracion.result }}"   != "success" ||
                "${{ needs.test-pjba-integracion.result }}"     != "success" ||
                "${{ needs.test-logistica-integracion.result }}" != "success" ]]; then
            echo "❌ Uno o más proyectos fallaron. Merge bloqueado."
            exit 1
          fi
          echo "✅ Los 3 proyectos pasaron. Merge permitido."
